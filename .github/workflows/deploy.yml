name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - PRABHU-DAS

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/ticketing-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/ticketing-frontend:latest

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST_2 }}
          username: ${{ secrets.VM_USERNAME_2 }}
          key: ${{ secrets.VM_SSH_KEY_2 }}
          source: "docker-compose.yml"
          target: "~/ticketing-app"

      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST_2 }}
          username: ${{ secrets.VM_USERNAME_2 }}
          key: ${{ secrets.VM_SSH_KEY_2 }}
          script: |
            cd ~/ticketing-app
            
            # Login to ACR
            echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            
            # Create a simple .env file dynamically from GitHub Secrets (or Azure Key Vault in the future)
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            
            # Since we are using pre-built images inside VM, we modify the compose file 
            # to use images instead of building from source directory
            sed -i 's|build: ./Backend|image: ${{ secrets.ACR_LOGIN_SERVER }}/ticketing-backend:latest|g' docker-compose.yml
            sed -i 's|build: ./Frontend|image: ${{ secrets.ACR_LOGIN_SERVER }}/ticketing-frontend:latest|g' docker-compose.yml
            
            # Pull latest images and restart containers
            docker-compose pull
            docker-compose up -d --remove-orphans
